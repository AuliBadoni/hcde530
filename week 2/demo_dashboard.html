<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo responses — dashboard</title>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --surface2: #243044;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --accent: #6ea8fe;
      --accent2: #8fd4c1;
      --warn: #f0c674;
      --radius: 10px;
      --font: "Segoe UI", system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
    }
    header {
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--surface2);
      padding-bottom: 1rem;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin: 0 0 0.35rem;
      letter-spacing: -0.02em;
    }
    header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
      border: 1px solid var(--surface2);
    }
    .stat .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    .stat .value {
      font-size: 1.65rem;
      font-weight: 700;
      color: var(--accent);
    }
    .stat .value.secondary { color: var(--accent2); }
    section {
      margin-bottom: 2.25rem;
    }
    section h2 {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 0 0 1rem;
      color: var(--text);
    }
    .role-grid {
      display: grid;
      gap: 0.65rem;
    }
    .role-row {
      display: grid;
      grid-template-columns: minmax(140px, 160px) 1fr 2.5rem;
      align-items: center;
      gap: 0.75rem;
      font-size: 0.9rem;
    }
    .role-row .name { color: var(--muted); }
    .role-row .bar-wrap {
      height: 22px;
      background: var(--surface2);
      border-radius: 6px;
      overflow: hidden;
    }
    .role-row .bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #4d8af0);
      border-radius: 6px;
      min-width: 4px;
      transition: width 0.4s ease;
    }
    .role-row .count { text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
    .chart {
      display: grid;
      gap: 0.35rem;
    }
    .chart-row {
      display: grid;
      grid-template-columns: 2.5rem 1fr 2rem;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.8rem;
    }
    .chart-row .id { color: var(--muted); font-variant-numeric: tabular-nums; }
    .chart-row .bar-wrap {
      height: 14px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
    }
    .chart-row .bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), #5cb89a);
      border-radius: 4px;
      min-width: 2px;
    }
    .chart-row .n { text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1rem;
    }
    .toolbar label { font-size: 0.85rem; color: var(--muted); }
    .toolbar input,
    .toolbar select {
      background: var(--surface);
      border: 1px solid var(--surface2);
      color: var(--text);
      padding: 0.45rem 0.65rem;
      border-radius: 6px;
      font: inherit;
    }
    .toolbar input[type="search"] { min-width: 200px; flex: 1; max-width: 360px; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--surface2);
    }
    th, td {
      text-align: left;
      padding: 0.65rem 0.85rem;
      border-bottom: 1px solid var(--surface2);
      vertical-align: top;
    }
    th {
      background: var(--surface2);
      color: var(--muted);
      font-weight: 600;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    tr:last-child td { border-bottom: none; }
    td.id { white-space: nowrap; color: var(--accent); font-weight: 600; }
    td.role { color: var(--warn); white-space: nowrap; }
    td.words { font-variant-numeric: tabular-nums; color: var(--muted); }
    td.response { color: #c9d6e8; }
    @media (max-width: 720px) {
      .role-row { grid-template-columns: 1fr; gap: 0.25rem; }
      .role-row .count { text-align: left; }
      table, thead, tbody, th, td, tr { display: block; }
      thead { display: none; }
      tr {
        border-bottom: 1px solid var(--surface2);
        padding: 0.75rem 0;
      }
      td { border: none; padding: 0.2rem 0.85rem; }
      td.id::before { content: "ID: "; color: var(--muted); font-weight: normal; }
      td.role::before { content: "Role: "; color: var(--muted); }
      td.words::before { content: "Words: "; color: var(--muted); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Demo responses</h1>
      <p>Static dashboard from <code>demo_responses.csv</code> — word counts and role mix.</p>
    </header>

    <div class="stats" id="stats" aria-live="polite"></div>

    <section aria-labelledby="h-role">
      <h2 id="h-role">Responses by role</h2>
      <div class="role-grid" id="role-chart"></div>
    </section>

    <section aria-labelledby="h-words">
      <h2 id="h-words">Word count by participant</h2>
      <div class="chart" id="word-chart"></div>
    </section>

    <section aria-labelledby="h-table">
      <h2 id="h-table">All responses</h2>
      <div class="toolbar">
        <label for="filter-role">Role</label>
        <select id="filter-role" aria-label="Filter by role"></select>
        <label for="search">Search</label>
        <input type="search" id="search" placeholder="Search text…" autocomplete="off" />
      </div>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Role</th>
              <th scope="col">Words</th>
              <th scope="col">Response</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script id="embedded-data" type="application/json">
[{"participant_id": "P01", "role": "UX Researcher", "response": "I usually start by reviewing whatever documentation exists, but honestly most of the time there isn't much. I end up doing a lot of stakeholder interviews just to figure out what the product is actually supposed to do.", "word_count": 38}, {"participant_id": "P02", "role": "UX Designer", "response": "The hardest part is getting engineers to understand why we need more than two weeks for discovery. They always want to jump straight to wireframes. I've started framing research as risk reduction and that helps a little.", "word_count": 37}, {"participant_id": "P03", "role": "Product Manager", "response": "We run two-week sprints and research keeps getting squeezed into the first three days. By the time we have findings, the design decisions are already made. I don't know how to fix that.", "word_count": 33}, {"participant_id": "P04", "role": "UX Researcher", "response": "Recruiting is always the bottleneck. We spend more time finding participants than actually running sessions. I wish we had a panel we could pull from instead of starting from scratch every time.", "word_count": 32}, {"participant_id": "P05", "role": "Content Strategist", "response": "Nobody invites me into the research phase. I find out what users said in the readout and by then the IA is already locked. The language problems surface in usability testing three months later.", "word_count": 34}, {"participant_id": "P06", "role": "UX Designer", "response": "I've started doing five-minute hallway tests with anyone I can find. It's not rigorous but it's faster than waiting for a formal study to get scheduled and approved.", "word_count": 28}, {"participant_id": "P07", "role": "UX Researcher", "response": "The synthesis step is where we lose people. Everyone attends the sessions but nobody wants to sit through two days of affinity mapping. I've tried doing it async with Miro but participation drops off.", "word_count": 34}, {"participant_id": "P08", "role": "Product Manager", "response": "My biggest frustration is that research findings don't translate into decisions. We get a deck with quotes and themes and then everyone nods and goes back to doing what they planned to do anyway.", "word_count": 34}, {"participant_id": "P09", "role": "UX Designer", "response": "I find it really hard to push back when someone senior says they already know what users want. Even when I have data that contradicts them.", "word_count": 26}, {"participant_id": "P10", "role": "UX Researcher", "response": "Remote sessions have actually improved our geographic diversity. We used to only talk to people in Seattle. Now we regularly include participants from smaller cities and that's changed some of our assumptions.", "word_count": 32}, {"participant_id": "P11", "role": "Content Strategist", "response": "I've been trying to introduce plain language principles but the legal team always pushes back. They want specific wording that users consistently misread in testing. It's a constant negotiation.", "word_count": 29}, {"participant_id": "P12", "role": "Product Manager", "response": "We don't have a dedicated researcher on my team so I end up doing interviews myself. I'm not sure I'm doing them well but it's better than not doing them at all.", "word_count": 32}, {"participant_id": "P13", "role": "UX Designer", "response": "The gap between what users say they do and what they actually do is real. I had a participant tell me they always read the confirmation email and then in the diary study we ran they never opened a single one.", "word_count": 41}, {"participant_id": "P14", "role": "UX Researcher", "response": "I'm spending more time writing reports that nobody reads than actually doing research. I've been experimenting with shorter formats, like a one-page brief, and that gets more engagement.", "word_count": 28}, {"participant_id": "P15", "role": "Product Manager", "response": "Our design system has made things more consistent but it's also made some teams less willing to question patterns that don't actually work for their users. Convention becomes a crutch.", "word_count": 30}, {"participant_id": "P16", "role": "UX Designer", "response": "I've started including a confidence rating in my recommendations, like this is high confidence from multiple sources versus this is directional from a single session. It's changed how people receive the findings.", "word_count": 32}, {"participant_id": "P17", "role": "UX Researcher", "response": "Accessibility keeps getting treated as a compliance checklist instead of a design constraint. I've had the most success when I can get an assistive technology user into a session early because seeing it is harder to argue with than reading about it.", "word_count": 42}, {"participant_id": "P18", "role": "Content Strategist", "response": "Error messages are the last thing anyone thinks about and the first thing users notice when something goes wrong. I've been trying to get them into scope earlier but they always end up being a handoff item.", "word_count": 37}, {"participant_id": "P19", "role": "UX Designer", "response": "I struggle with knowing when I have enough data. There's always pressure to do one more round but at some point you're validating what you already know.", "word_count": 27}, {"participant_id": "P20", "role": "Product Manager", "response": "The most useful thing research has done for us is help us stop building things. We killed two features last quarter based on findings and that felt like a win even though it's hard to show in a metric.", "word_count": 39}, {"participant_id": "P21", "role": "UX Researcher", "response": "We've been using AI to help with transcript analysis and it speeds things up but I always do a pass myself because it flattens nuance. It's good at finding patterns and bad at knowing which ones matter.", "word_count": 37}, {"participant_id": "P22", "role": "UX Designer", "response": "Onboarding is where our product falls apart and everyone knows it but there's no owner. Product thinks it's design, design thinks it's content, content thinks it's engineering. The user just bounces.", "word_count": 31}, {"participant_id": "P23", "role": "Content Strategist", "response": "I've been pushing for a terminology audit across the product for two years. Different parts of the app use different words for the same thing and users notice even if they can't articulate why.", "word_count": 34}, {"participant_id": "P24", "role": "UX Researcher", "response": "The best sessions I run are the ones where I say almost nothing. The worst are when I'm trying to cover too many topics and I end up steering instead of listening.", "word_count": 32}, {"participant_id": "P25", "role": "Product Manager", "response": "We did a diary study last year and the data was incredible but we've never had the budget or time to do another one. I think longitudinal research is undersold in product teams.", "word_count": 33}]
  </script>
  <script>
    (function () {
      const DATA = JSON.parse(document.getElementById("embedded-data").textContent);
      const words = DATA.map(function (r) { return r.word_count; });
      const n = words.length;
      const sum = words.reduce(function (a, b) { return a + b; }, 0);
      const avg = n ? sum / n : 0;
      const min = n ? Math.min.apply(null, words) : 0;
      const max = n ? Math.max.apply(null, words) : 0;

      var statsEl = document.getElementById("stats");
      statsEl.innerHTML =
        '<div class="stat"><div class="label">Responses</div><div class="value">' + n + "</div></div>" +
        '<div class="stat"><div class="label">Avg words</div><div class="value secondary">' +
        (n ? avg.toFixed(1) : "—") +
        "</div></div>" +
        '<div class="stat"><div class="label">Shortest</div><div class="value">' + (n ? min : "—") + "</div></div>" +
        '<div class="stat"><div class="label">Longest</div><div class="value">' + (n ? max : "—") + "</div></div>";

      var roleCounts = {};
      DATA.forEach(function (r) {
        roleCounts[r.role] = (roleCounts[r.role] || 0) + 1;
      });
      var roleEntries = Object.keys(roleCounts)
        .map(function (k) { return { role: k, count: roleCounts[k] }; })
        .sort(function (a, b) { return b.count - a.count; });
      var maxRole = roleEntries.length ? Math.max.apply(null, roleEntries.map(function (e) { return e.count; })) : 1;

      var roleChart = document.getElementById("role-chart");
      roleEntries.forEach(function (e) {
        var pct = (e.count / maxRole) * 100;
        var row = document.createElement("div");
        row.className = "role-row";
        row.innerHTML =
          '<span class="name">' +
          e.role +
          '</span><div class="bar-wrap"><div class="bar" style="width:' +
          pct +
          '%"></div></div><span class="count">' +
          e.count +
          "</span>";
        roleChart.appendChild(row);
      });

      var wordChart = document.getElementById("word-chart");
      var maxW = max || 1;
      DATA.forEach(function (r) {
        var pct = (r.word_count / maxW) * 100;
        var row = document.createElement("div");
        row.className = "chart-row";
        row.innerHTML =
          '<span class="id">' +
          r.participant_id +
          '</span><div class="bar-wrap"><div class="bar" style="width:' +
          pct +
          '%"></div></div><span class="n">' +
          r.word_count +
          "</span>";
        wordChart.appendChild(row);
      });

      var roles = ["All roles"].concat(
        Object.keys(roleCounts).sort(function (a, b) { return a.localeCompare(b); })
      );
      var sel = document.getElementById("filter-role");
      roles.forEach(function (r) {
        var opt = document.createElement("option");
        opt.value = r === "All roles" ? "" : r;
        opt.textContent = r;
        sel.appendChild(opt);
      });

      var searchEl = document.getElementById("search");
      var tbody = document.getElementById("tbody");

      function renderTable() {
        var roleFilter = sel.value;
        var q = (searchEl.value || "").toLowerCase().trim();
        tbody.innerHTML = "";
        DATA.forEach(function (r) {
          if (roleFilter && r.role !== roleFilter) return;
          if (q && r.response.toLowerCase().indexOf(q) === -1 && r.participant_id.toLowerCase().indexOf(q) === -1)
            return;
          var tr = document.createElement("tr");
          tr.innerHTML =
            '<td class="id">' +
            escapeHtml(r.participant_id) +
            '</td><td class="role">' +
            escapeHtml(r.role) +
            '</td><td class="words">' +
            r.word_count +
            '</td><td class="response">' +
            escapeHtml(r.response) +
            "</td>";
          tbody.appendChild(tr);
        });
      }

      function escapeHtml(s) {
        var div = document.createElement("div");
        div.textContent = s;
        return div.innerHTML;
      }

      sel.addEventListener("change", renderTable);
      searchEl.addEventListener("input", renderTable);
      renderTable();
    })();
  </script>
</body>
</html>
